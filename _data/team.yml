- name: Prof. Dr. Peter Stephan
  role: Berater der GetPEC mbH &
  role_detail: Professor für Technische Thermodynamik an der TU Darmstadt
  description: "Prof. Dr. Peter Stephan ist Professor für Technische Thermodynamik an der TU Darmstadt und berät GetPEC in wissenschaftlichen und strategischen Fragestellungen. Er gilt als einer der führenden Experten für Wärme- und Stoffübertragung, insbesondere bei Phasenwechselprozessen, und ist Autor zahlreicher internationaler Fachpublikationen."
