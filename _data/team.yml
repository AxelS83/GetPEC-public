- name: Dr. Felix Brinckmann
  role: Senior Engineer der GetPEC mbH & 
  role_detail: Principal Engineer der Alcon GmbH
  description: "Dr. Felix Brinckmann ist Senior Engineer bei GetPEC mit Schwerpunkten in der experimentellen Thermodynamik, Sensorintegration und Prüfstandsentwicklung. Er bringt tiefe Expertise in der Konzeption und Umsetzung kundenspezifischer Messlösungen mit und unterstützt Projekte von der ersten Konzeptphase bis zur Inbetriebnahme."
