- name: Dr. Martin Freystein
  role: Geschäftsführer der GetPEC mbH & 
  role_detail: Bereichsleiter Wärme der Entega AG, Lehrbeauftragter an der UAS Frankfurt
  description: "Dr. Martin Freystein ist Geschäftsführer von GetPEC mbH und Bereichsleiter Wärme der Entega AG. Zusätzlich ist er Lehrbeauftragter für Thermodynamik an der UAS Frankfurt. Er verfügt über breite Erfahrung in thermodynamischen Prozessen, Energiesystemen und der industriellen Umsetzung. Seine Expertise umfasst Wärmeversorgungssysteme, Effizienzoptimierung und das Projektmanagement komplexer technischer Vorhaben."
