- name: Dr. Axel Sielaff
  role: Hauptgründer der GetPEC mbH &
  role_detail: Gruppenleiter am Institut für Technische Thermodynamik der TU Darmstadt
  description: "Dr. Axel Sielaff ist Gründer von GetPEC und Gruppenleiter am Institut für Technische Thermodynamik der TU Darmstadt. Seine Schwerpunkte liegen in der experimentellen Wärme- und Stoffübertragung, insbesondere bei Verdampfungs- und Kondensationsprozessen sowie der IR-Thermographie als quantitatives Messverfahren. Er bringt fundiertes wissenschaftliches Know-how direkt in die industrielle Projektarbeit ein."
